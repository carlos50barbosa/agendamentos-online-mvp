name: CI/CD

# CI em todo PR e push na main; CD (deploy por SSH) só na main, após os testes
# e o build do frontend passarem. Reusa scripts/deploy.sh no VPS.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # Banco de verdade — e MariaDB 10.11, a MESMA engine da VPS. Isso importa: quatro
    # migrations usam `ADD COLUMN IF NOT EXISTS`, que é sintaxe MariaDB e o MySQL rejeita
    # (erro 1064). Um CI em MySQL testaria contra uma engine que produção não usa.
    #
    # Sem banco não há smoke: os testes de rota mockam pool.query, e um mock nunca reclama
    # de coluna inexistente — foi assim que o /clientes ficou 500 em produção por três
    # deploys ("Unknown column 'base.billable_appointments'").
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: ci-root
          MARIADB_DATABASE: agendamentos_smoke
        ports:
          - 3306:3306

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ci-root
      MYSQL_DATABASE: agendamentos_smoke
      JWT_SECRET: ci-smoke-secret
      # O smoke FALHA (em vez de pular) se o banco não estiver de pé. Um smoke que pula
      # sozinho quando o ambiente está torto é um verde falso — pior que teste nenhum.
      SMOKE_REQUIRE_DB: '1'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci

      # A espera é feita pelo mesmo driver que a aplicação usa (mysql2), e não por um
      # binário de dentro do container: o nome do cliente muda entre MySQL e MariaDB, e
      # um health-cmd errado derruba o job antes de qualquer teste rodar.
      - name: Aguardar o MariaDB
        run: |
          for i in $(seq 1 60); do
            if node -e "require('mysql2/promise').createConnection({host:'127.0.0.1',port:3306,user:'root',password:'ci-root'}).then(c=>c.query('SELECT VERSION() v').then(([r])=>{console.log('MariaDB pronto:',r[0].v);return c.end()})).then(()=>process.exit(0)).catch(()=>process.exit(1))"; then
              exit 0
            fi
            sleep 2
          done
          echo "MariaDB nao respondeu em 120s"; exit 1

      # schema.sql + todas as migrations, do zero. Se uma migration quebrar o schema,
      # o CI para aqui — antes era só no VPS, na unha.
      - name: Banco de teste (schema + migrations)
        run: npm run db:setup:smoke

      # Roda TUDO em tests/ — inclusive o smoke, que sobe o app contra o MySQL acima e
      # chama as rotas por HTTP. Antes o gate era só test:asaas + test:plan, então
      # test:wa, test:crm e test:reports nunca rodavam no CI.
      - name: Suíte completa (inclui o smoke das rotas contra o MySQL)
        run: npm run test:all

      - name: Plan/billing flows
        run: npm run test:plan

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Vite build (valida compilação de todo o frontend)
        run: npm run build

  deploy:
    name: Deploy (VPS)
    needs: [backend-tests, frontend-build]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Adicione required reviewers em Settings > Environments > production
    # para exigir aprovação manual antes de cada deploy.
    environment: production
    steps:
      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          DEPLOY_API_URL: ${{ secrets.DEPLOY_API_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST:-}" ] || [ -z "${SSH_USER:-}" ] || [ -z "${SSH_KEY:-}" ]; then
            echo "::error::Faltam secrets: DEPLOY_SSH_HOST, DEPLOY_SSH_USER e/ou DEPLOY_SSH_KEY."
            exit 1
          fi
          PORT="${SSH_PORT:-22}"
          DIR="${DEPLOY_DIR:-/opt/apps/agendamentos-online-mvp}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -T 10 -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          API_ARG=""
          if [ -n "${DEPLOY_API_URL:-}" ]; then API_ARG="API_URL=$DEPLOY_API_URL"; fi
          echo "==> Disparando scripts/deploy.sh em $SSH_USER@$SSH_HOST:$PORT ($DIR)"
          # ConnectTimeout: sem ele um host/porta inalcançável só falha após ~140s do timeout
          # de TCP, sem mensagem — o job parece travado em vez de mal configurado.
          # ServerAlive*: o deploy leva minutos; derruba a sessão se a conexão morrer no meio
          # em vez de pendurar o job até o limite do runner.
          set +e
          ssh -i ~/.ssh/id_deploy -p "$PORT" \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=6 \
            "$SSH_USER@$SSH_HOST" \
            "cd '$DIR' && BRANCH=main $API_ARG bash scripts/deploy.sh"
          rc=$?
          set -e
          # 75 = scripts/deploy.sh nao conseguiu o lock (outro deploy em andamento).
          if [ "$rc" -eq 75 ]; then
            echo "::error::Outro deploy esta em andamento na VPS. Aguarde terminar e re-execute este workflow."
          elif [ "$rc" -eq 255 ]; then
            echo "::error::Falha de SSH (nao conectou). Confira DEPLOY_SSH_HOST/PORT, a chave e o firewall da VPS."
          fi
          exit $rc

      - name: Smoke check (opcional)
        env:
          URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${URL:-}" ]; then
            echo "Sem DEPLOY_HEALTHCHECK_URL configurado — pulando smoke check."
            exit 0
          fi
          echo "==> Health check em $URL"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" || echo 000)
            echo "tentativa $i: HTTP $code"
            case "$code" in 2*|3*) echo "OK"; exit 0;; esac
            sleep 5
          done
          echo "::error::Health check falhou em $URL"
          exit 1
