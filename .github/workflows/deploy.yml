name: CI/CD

# CI em todo PR e push na main; CD (deploy por SSH) só na main, após os testes
# e o build do frontend passarem. Reusa scripts/deploy.sh no VPS.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Gate do deploy: suíte Asaas (determinística, cobre a migração de pagamentos).
      - name: Asaas suite (client + payments + webhook + deposit + subscription)
        run: npm run test:asaas
      # Informativo: test:plan é pré-existente e sensível à versão do Node
      # (falha 500!=403 no Node 24; CI atual roda em Node 18). Não bloqueia o
      # deploy até ser estabilizado. Ver docs/DEPLOY.md.
      - name: Plan/billing flows (informativo)
        run: npm run test:plan
        continue-on-error: true

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Vite build (valida compilação de todo o frontend)
        run: npm run build

  deploy:
    name: Deploy (VPS)
    needs: [backend-tests, frontend-build]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Adicione required reviewers em Settings > Environments > production
    # para exigir aprovação manual antes de cada deploy.
    environment: production
    steps:
      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          DEPLOY_API_URL: ${{ secrets.DEPLOY_API_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST:-}" ] || [ -z "${SSH_USER:-}" ] || [ -z "${SSH_KEY:-}" ]; then
            echo "::error::Faltam secrets: DEPLOY_SSH_HOST, DEPLOY_SSH_USER e/ou DEPLOY_SSH_KEY."
            exit 1
          fi
          PORT="${SSH_PORT:-22}"
          DIR="${DEPLOY_DIR:-/opt/apps/agendamentos-online-mvp}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          API_ARG=""
          if [ -n "${DEPLOY_API_URL:-}" ]; then API_ARG="API_URL=$DEPLOY_API_URL"; fi
          echo "==> Disparando scripts/deploy.sh em $SSH_USER@$SSH_HOST:$PORT ($DIR)"
          ssh -i ~/.ssh/id_deploy -p "$PORT" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "cd '$DIR' && BRANCH=main $API_ARG bash scripts/deploy.sh"

      - name: Smoke check (opcional)
        env:
          URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${URL:-}" ]; then
            echo "Sem DEPLOY_HEALTHCHECK_URL configurado — pulando smoke check."
            exit 0
          fi
          echo "==> Health check em $URL"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" || echo 000)
            echo "tentativa $i: HTTP $code"
            case "$code" in 2*|3*) echo "OK"; exit 0;; esac
            sleep 5
          done
          echo "::error::Health check falhou em $URL"
          exit 1
