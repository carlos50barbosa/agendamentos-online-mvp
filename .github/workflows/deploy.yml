name: CI/CD

# CI em todo PR e push na main; CD (deploy por SSH) só na main, após os testes
# e o build do frontend passarem. Reusa scripts/deploy.sh no VPS.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # MySQL de verdade. Sem ele, o smoke não existe: os testes de rota mockam pool.query,
    # e um mock nunca reclama de coluna inexistente — foi assim que o /clientes ficou 500
    # em produção por três deploys ("Unknown column 'base.billable_appointments'").
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci-root
          MYSQL_DATABASE: agendamentos_smoke
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci-root"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ci-root
      MYSQL_DATABASE: agendamentos_smoke
      JWT_SECRET: ci-smoke-secret
      # O smoke FALHA (em vez de pular) se o banco não estiver de pé. Um smoke que pula
      # sozinho quando o ambiente está torto é um verde falso — pior que teste nenhum.
      SMOKE_REQUIRE_DB: '1'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci

      # schema.sql + todas as migrations, do zero. Se uma migration quebrar o schema,
      # o CI para aqui — antes era só no VPS, na unha.
      - name: Banco de teste (schema + migrations)
        run: npm run db:setup:smoke

      # Roda TUDO em tests/ — inclusive o smoke, que sobe o app contra o MySQL acima e
      # chama as rotas por HTTP. Antes o gate era só test:asaas + test:plan, então
      # test:wa, test:crm e test:reports nunca rodavam no CI.
      - name: Suíte completa (inclui o smoke das rotas contra o MySQL)
        run: npm run test:all

      - name: Plan/billing flows
        run: npm run test:plan

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Vite build (valida compilação de todo o frontend)
        run: npm run build

  deploy:
    name: Deploy (VPS)
    needs: [backend-tests, frontend-build]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Adicione required reviewers em Settings > Environments > production
    # para exigir aprovação manual antes de cada deploy.
    environment: production
    steps:
      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          DEPLOY_API_URL: ${{ secrets.DEPLOY_API_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST:-}" ] || [ -z "${SSH_USER:-}" ] || [ -z "${SSH_KEY:-}" ]; then
            echo "::error::Faltam secrets: DEPLOY_SSH_HOST, DEPLOY_SSH_USER e/ou DEPLOY_SSH_KEY."
            exit 1
          fi
          PORT="${SSH_PORT:-22}"
          DIR="${DEPLOY_DIR:-/opt/apps/agendamentos-online-mvp}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          API_ARG=""
          if [ -n "${DEPLOY_API_URL:-}" ]; then API_ARG="API_URL=$DEPLOY_API_URL"; fi
          echo "==> Disparando scripts/deploy.sh em $SSH_USER@$SSH_HOST:$PORT ($DIR)"
          ssh -i ~/.ssh/id_deploy -p "$PORT" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "cd '$DIR' && BRANCH=main $API_ARG bash scripts/deploy.sh"

      - name: Smoke check (opcional)
        env:
          URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${URL:-}" ]; then
            echo "Sem DEPLOY_HEALTHCHECK_URL configurado — pulando smoke check."
            exit 0
          fi
          echo "==> Health check em $URL"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" || echo 000)
            echo "tentativa $i: HTTP $code"
            case "$code" in 2*|3*) echo "OK"; exit 0;; esac
            sleep 5
          done
          echo "::error::Health check falhou em $URL"
          exit 1
